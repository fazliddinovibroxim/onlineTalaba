services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: talaba
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  livekit:
    image: livekit/livekit-server:v1.7.2
    command: --config /etc/livekit.yaml
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882:7882/udp"
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml:ro

  app:
    build: .
    env_file: .env
    ports:
      - "9393:9393"
    depends_on:
      - postgres
      - redis
      - livekit
    volumes:
      - /opt/uploads:/app/uploads