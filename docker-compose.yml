services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: talaba
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  livekit:
    image: livekit/livekit-server:v1.7.2
    command: --config /etc/livekit.yaml
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882:7882/udp"
      - "50000-50100:50000-50100/udp"
    volumes:
      - ./livekit.yml:/etc/livekit.yaml:ro

  app:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: talaba_project
    env_file: .env
    ports:
      - "${APP_PORT}:${APP_PORT}"
    depends_on:
      - postgres
      - redis
      - livekit

    restart: unless-stopped

    mem_limit: 7g
    environment:
      JAVA_OPTS: >
        -Djava.net.preferIPv4Stack=true
        -Djava.net.preferIPv4Addresses=true
        -Xms2g
        -Xmx7g
    volumes:
      - /opt/uploads:/app/uploads
